version: '3.8'

services:
  backend:
    image: php:8.2-fpm
    container_name: iind-backend
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: iind-db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
