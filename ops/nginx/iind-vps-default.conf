server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name iindiinda.duckdns.org;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl ipv6only=on default_server;

    server_name iindiinda.duckdns.org;
    root /var/www/iind-app/frontend/public;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        rewrite ^ /index.html break;
    }

    location ^~ /api {
        root /var/www/iind-app/backend/public;
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/iind-app/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/iind-app/backend/public;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }

    ssl_certificate /etc/letsencrypt/live/iindiinda.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iindiinda.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
