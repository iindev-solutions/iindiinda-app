server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /var/www/iind-app/frontend/public;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri /index.html;
    }

    location ^~ /api {
        root /var/www/iind-app/backend/public;
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/iind-app/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/iind-app/backend/public;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }
}
